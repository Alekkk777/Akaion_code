substitutions:
  _REGION: europe-west1
  _REPO: akaion-lifeos

steps:
  - name: gcr.io/cloud-builders/docker
    args: ['build', '-f', 'Dockerfile.api', '-t', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/akaion-api', '.']

  - name: gcr.io/cloud-builders/docker
    args: ['push', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/akaion-api']

  # L'infra (servizio, IAM, env vars) e' gestita da Terraform (infra/); qui aggiorniamo solo l'immagine.
  - name: gcr.io/cloud-builders/gcloud
    args:
      - run
      - deploy
      - akaion-api
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/akaion-api
      - --region=${_REGION}
      - --platform=managed

  - name: gcr.io/cloud-builders/docker
    args: ['build', '-f', 'Dockerfile.worker', '-t', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/akaion-worker', '.']

  - name: gcr.io/cloud-builders/docker
    args: ['push', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/akaion-worker']

  - name: gcr.io/cloud-builders/gcloud
    args:
      - run
      - deploy
      - akaion-worker
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/akaion-worker
      - --region=${_REGION}
      - --platform=managed

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/akaion-api
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/akaion-worker
