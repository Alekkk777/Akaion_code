services:
  firestore-emulator:
    image: google/cloud-sdk:emulators
    command: gcloud emulators firestore start --host-port=0.0.0.0:8200
    ports:
      - "8200:8200"

  pubsub-emulator:
    image: google/cloud-sdk:emulators
    command: gcloud beta emulators pubsub start --host-port=0.0.0.0:8085
    ports:
      - "8085:8085"

  # Crea topic + push subscription sull'emulatore all'avvio (in GCP reale lo fa Terraform).
  # Gira una volta e esce; api/worker aspettano il suo completamento.
  pubsub-init:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: ["python", "scripts/init_pubsub_emulator.py"]
    environment:
      - GCP_PROJECT=akaion-dev
      - PUBSUB_EMULATOR_HOST=pubsub-emulator:8085
      - PUSH_ENDPOINT=http://worker:8080/pubsub/push
    depends_on:
      - pubsub-emulator

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      - GCP_PROJECT=akaion-dev
      - USE_PUBSUB=true
      - USE_FIRESTORE=true
      - PUBSUB_EMULATOR_HOST=pubsub-emulator:8085
      - FIRESTORE_EMULATOR_HOST=firestore-emulator:8200
      - ENVIRONMENT=local
    ports:
      - "8000:8080"
    depends_on:
      firestore-emulator:
        condition: service_started
      pubsub-emulator:
        condition: service_started
      pubsub-init:
        condition: service_completed_successfully

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      - GCP_PROJECT=akaion-dev
      - USE_PUBSUB=true
      - USE_FIRESTORE=true
      - PUBSUB_EMULATOR_HOST=pubsub-emulator:8085
      - FIRESTORE_EMULATOR_HOST=firestore-emulator:8200
      - ENVIRONMENT=local
    ports:
      - "8001:8080"
    depends_on:
      firestore-emulator:
        condition: service_started
      pubsub-emulator:
        condition: service_started
      pubsub-init:
        condition: service_completed_successfully
